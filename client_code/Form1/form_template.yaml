components:
- components:
  - layout_properties: {grid_position: 'NNRFIN,PDFSCA TCOEZG,NBPOSK'}
    name: account_label
    properties: {align: left, font_size: 10, icon: 'fa:user', underline: true}
    type: Label
  - event_bindings: {}
    layout_properties: {grid_position: 'NNRFIN,PDFSCA AAFZKM,VXPHZH'}
    name: login_btn
    properties: {align: right, icon: 'fa:user-circle', role: tonal-button, text: ログイン / 登録, underline: true}
    type: Button
  - event_bindings: {click: settings_btn_click}
    layout_properties: {grid_position: 'NNRFIN,PDFSCA IDKTEH,ZUGNUW'}
    name: settings_btn
    properties: {align: right, icon: 'fa:cog', role: tonal-button, text: 設定}
    type: Button
  - layout_properties: {grid_position: 'NNRFIN,EYPTHW HZAMLH,QWNKLN'}
    name: title_top
    properties:
      align: center
      bold: true
      font_size: 26
      foreground: '#0c09ec'
      italic: true
      spacing:
        margin: [42, null, null, null]
      text: ダウンローダー
    type: Label
  - layout_properties: {grid_position: 'NNRFIN,EYPTHW RSOUEW,XJWZTQ'}
    name: explanation
    properties:
      background: '#7bd6f4'
      content: |-
        【使い方】
        　① ダウンロードしたい動画のURLを貼り付けてください
        　② 「解析開始」を押してください
        　　 ※失敗しても再実行で成功する可能性あり
        　③ 解析が成功するとダウンロードができます
        　　 形式を選択して「ダウンロード」を押してください
        　④ 開いたページからダウンロードすることができます
      spacing:
        margin: [52, null, null, null]
    type: RichText
  - event_bindings: {change: url_input_change}
    layout_properties: {grid_position: 'NNRFIN,EYPTHW LNXMCD,QPFIWD'}
    name: url_input
    properties: {placeholder: URLを貼ってください}
    type: TextBox
  - layout_properties: {grid_position: 'NNRFIN,EYPTHW NBSBUX,CEZZYJ'}
    name: format_dropdown
    properties: {}
    type: DropDown
  - event_bindings: {click: btn_test}
    layout_properties: {grid_position: 'NNRFIN,EYPTHW UUEPGF,FIOCCJ'}
    name: download_btn
    properties: {background: '#2196F3', bold: false, font: '', foreground: '#ffffff', icon: 'fa:search', italic: true, role: filled-button, text: 解析開始}
    type: Button
  - event_bindings: {}
    layout_properties: {grid_position: 'NNRFIN,EYPTHW LUHBWF,BHCQVB'}
    name: clear_btn
    properties: {background: 'theme:On Primary', icon: 'fa:trash', italic: true, role: outlined-button, text: クリア, underline: false}
    type: Button
  - layout_properties: {grid_position: 'NNRFIN,EYPTHW RTUUOT,FANBRK'}
    name: label_1
    properties: {italic: true, text: ＜ダウンロード情報＞}
    type: Label
  - layout_properties: {grid_position: 'NNRFIN,EYPTHW MQQSBP,LHRHHB'}
    name: title_label
    properties:
      background: '#f5f5f5'
      spacing:
        padding: [30, null, '30', null]
      visible: true
    type: Label
  layout_properties: {grid_position: 'LVXIOZ,HHEXNZ'}
  name: column_panel_1
  properties: {}
  type: ColumnPanel
container:
  properties: {background: '#FFFEF0'}
  type: ColumnPanel
is_package: true
